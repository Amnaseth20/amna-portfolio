<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Amna Seth | User experience Designer/ Portfolio</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link
        href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600&family=Outfit:wght@400;600;700;800&display=swap"
        rel="stylesheet">
    <style>
        :root {
            --bg: #050505;
            --surface: rgba(24, 18, 20, 0.6);
            --surface-hover: rgba(48, 36, 40, 0.8);
            --border: rgba(255, 255, 255, 0.08);
            --text-main: #f8fafc;
            --text-muted: #94a3b8;
            --accent-1: #ec4899;
            --accent-2: #be185d;
            --glow-1: rgba(236, 72, 153, 0.5);
            --glow-2: rgba(190, 24, 93, 0.5);
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Inter', sans-serif;
            background-color: var(--bg);
            color: var(--text-main);
            line-height: 1.7;
            overflow-x: hidden;
            scroll-behavior: smooth;
        }

        /* Ambient Background */
        .ambient-bg {
            position: fixed;
            top: 0;
            left: 0;
            width: 100vw;
            height: 100vh;
            z-index: -1;
            overflow: hidden;
            background: radial-gradient(circle at 15% 50%, rgba(236, 72, 153, 0.08), transparent 50%),
                radial-gradient(circle at 85% 30%, rgba(190, 24, 93, 0.08), transparent 50%);
            pointer-events: none;
        }

        .ambient-orb {
            position: absolute;
            border-radius: 50%;
            filter: blur(100px);
            opacity: 0.5;
            animation: float 20s infinite alternate ease-in-out;
        }

        .orb-1 {
            width: 400px;
            height: 400px;
            background: var(--accent-1);
            top: -100px;
            left: -100px;
        }

        .orb-2 {
            width: 500px;
            height: 500px;
            background: var(--accent-2);
            bottom: -200px;
            right: -100px;
            animation-delay: -5s;
        }

        @keyframes float {
            0% { transform: translate(0, 0) scale(1); }
            100% { transform: translate(50px, 50px) scale(1.2); }
        }

        h1, h2, h3, h4 {
            font-family: 'Outfit', sans-serif;
            font-weight: 700;
        }

        .gradient-text {
            background: linear-gradient(135deg, var(--text-main) 0%, var(--text-muted) 100%);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }

        .gradient-text-accent {
            background: linear-gradient(135deg, var(--accent-1) 0%, var(--accent-2) 100%);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }

        header {
            position: fixed;
            top: 1rem;
            left: 50%;
            transform: translateX(-50%);
            width: 90%;
            max-width: 1200px;
            padding: 1rem 2rem;
            display: flex;
            justify-content: space-between;
            align-items: center;
            background: rgba(10, 10, 12, 0.6);
            backdrop-filter: blur(20px);
            border: 1px solid var(--border);
            border-radius: 100px;
            z-index: 100;
        }

        .logo {
            font-family: 'Outfit', sans-serif;
            font-size: 1.5rem;
            font-weight: 800;
            text-decoration: none;
            color: var(--text-main);
        }

        nav a {
            text-decoration: none;
            color: var(--text-muted);
        }

        .btn {
            padding: 0.8rem 1.8rem;
            background: linear-gradient(135deg, var(--accent-1), var(--accent-2));
            color: white;
            border-radius: 100px;
            text-decoration: none;
        }

        section {
            padding: 5rem 0;
        }

        .container {
            max-width: 1200px;
            margin: 0 auto;
            padding: 0 2rem;
        }
    </style>
</head>

<body>

<header>
    <a href="#" class="logo">A.Seth</a>
    <nav>
        <a href="#about">About</a>
        <a href="#projects">Work</a>
        <a href="#experience">Experience</a>
        <a href="#contact">Contact</a>
    </nav>
    <a href="#contact" class="btn">Let's Talk</a>
</header>

<main>

<section class="hero">
    <div class="container">
        <h1>Crafting Digital Experiences</h1>
        <p>I'm Amna Seth, a UX/UI & Digital Media Designer.</p>
    </div>
</section>

<section id="about">
    <div class="container">
        <h2>About Me</h2>
        <p>I design thoughtful, inclusive digital experiences.</p>
    </div>
</section>

<section id="projects">
    <div class="container">
        <h2>Featured Work</h2>
    </div>
</section>

<section id="experience">
    <div class="container">
        <h2>My Journey</h2>
    </div>
</section>

<section id="contact">
    <div class="container">
        <h2>Contact</h2>
    </div>
</section>

</main>

</body>
</html>
